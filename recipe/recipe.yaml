schema_version: 1

context:
  python_min: "3.11"
  name: openfe
  version: "1.10.0"

recipe:
  name: openfe-suite
  version: ${{ version }}

source:
  url: https://github.com/OpenFreeEnergy/${{ name }}/archive/refs/tags/v${{ version }}.tar.gz
  sha256: efef25907dc0568b68895e351ba3bae660e166559a3037af28bb9e128c1d5c4b

build:
  number: 1

outputs:
  - package:
      name: openfe-base
    build:
      noarch: python
      script:
        file: build_base.sh
      python:
          entry_points:
            - openfe = openfecli.cli:main
    requirements:
      host:
        - pip
        - python ${{ python_min }}.* 
        - setuptools
        - setuptools_scm
      run:
        - cinnabar >=0.5.0,<0.6.0
        - click >=8.2.0,<9.0
        - gufe >=1.9.0,<1.10
        - kartograf >=1.2.0,<2.0
        - konnektor >=0.2.0,<0.4.0
        - lomap2 >=3.2.1
        - matplotlib-base
        - networkx
        - numpy
        - openfe-analysis >=0.4.0,<0.5.0  # Upper pin so we can make breaking changes, lower pin b/c https://github.com/OpenFreeEnergy/openfe/issues/1834#issuecomment-3920079481
        - openff-toolkit-base >=0.16.2,<0.19  # upper pinning 0.19, just so we can test it before conda-forge pulls it in.
        - openff-units ==0.3.1  # https://github.com/OpenFreeEnergy/openfe/pull/1374
        - openmm !=8.1.0,!=8.3,>=8.0.0,<8.5.0  # omit 8.3.0 and 8.3.1 due to https://github.com/openmm/openmm/pull/5069
        - openmmforcefields >=0.15.0  # min needed for https://github.com/OpenFreeEnergy/openfe/pull/1695
        - openmmtools >=0.25.3,<0.26  # fix to support numpy >=2.3: https://github.com/choderalab/openmmtools/pull/793
        - packaging
        - pint >=0.24.0
        - plugcli
        - pooch >=1.9.0  # min needed for https://github.com/fatiando/pooch/issues/502
        - psutil <7.2.0  # remove this in next release that includes https://github.com/OpenFreeEnergy/openfe/pull/1779
        - pydantic >=2.0,<2.12  # https://github.com/openforcefield/openff-interchange/issues/1346
        - pygraphviz
        - pymbar >=4.0
        - pytest
        - pytest-regressions
        - pytest-rerunfailures
        - python >=${{ python_min }}
        - rdkit
        - rich
        - threadpoolctl
        - typing-extensions
      run_constraints:
        - dask >=2025  # drop this constraint when handled upstream in espaloma-feedstock  
        - smirnoff99frosst >=1.1.0.1  # https://github.com/openforcefield/smirnoff99Frosst/issues/109
        - openff-interchange-base >=0.5.0, != 0.5.1  # https://github.com/openforcefield/openff-interchange/issues/1450 and https://github.com/OpenFreeEnergy/openfe/pull/1901
    tests:
      - python:
          imports:
            - openfe
          pip_check: false
          python_version: ${{ python_min }}
      - requirements:
          run:
            - pip
            - pytest-xdist
            - python ${{ python_min }}.*
        script:
          - openfe --help
          - openfe --version
          - python -c "import ${{ name }}; print(${{ name }}.__version__)"
          - python -c "import ${{ name }}; assert(${{ name }}.__version__ == '${{ version }}')"
          - pytest -v --pyargs openfe openfecli

    # Test section duplicated for now, will be more important later
    # when we add more packages and skip tests for optional deps
  - package:
      name: openfe
    build:
      noarch: python
    requirements:
      host:
        - pip
        - python ${{ python_min }}.* 
        - setuptools
        - setuptools_scm
      run:
        - python >=${{ python_min }}
        - jq
        - py3dmol
        - ${{ pin_subpackage('openfe-base', exact=True) }}
    tests:
      - python:
          imports:
            - openfe
          pip_check: false
          python_version: ${{ python_min }}
      - requirements:
          run:
            - pip
            - pytest-xdist
            - python ${{ python_min }}.*
        script:
          - openfe --help
          - openfe --version
          - python -c "import ${{ name }}; print(${{ name }}.__version__)"
          - python -c "import ${{ name }}; assert(${{ name }}.__version__ == '${{ version }}')"
          - pytest -v --pyargs openfe openfecli

about:
  license: MIT
  license_file: LICENSE
  summary: Free software for Free Energies.
  description: |
    The Open Free Energy (OpenFE) project is dedicated to the maintenance and
    development of open source tools for free energy calculations to guide
    pharmaceutical drug design and discovery. This package enables researchers
    to plan, execute, and analyze networks of free energy calculations.
  homepage: https://openfree.energy/
  repository: https://github.com/OpenFreeEnergy/openfe
  documentation: https://docs.openfree.energy

extra:
  feedstock-name: openfe
  recipe-maintainers:
    - IAlibay
    - atravitz
    - dwhswenson
    - mikemhenry
